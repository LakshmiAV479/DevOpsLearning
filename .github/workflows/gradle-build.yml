
name: Spring Boot Gradle Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build project
        run: |
          cd demo
          chmod +x gradlew
          ./gradlew build

      - name: Run tests
        run: |
          cd demo
          ./gradlew test
